<!DOCTYPE html>
<html>
<head>
  <title>Telemetry Dashboard</title>
  <meta http-equiv="refresh" content="1">
</head>
<body>
  <h1>Live Telemetry</h1>
  <div id="data"></div>

  <button onclick="location.href='logging.php?state=on'">Start Logging</button>
  <button onclick="location.href='logging.php?state=off'">Stop Logging</button>

  <script>
    async function update() {
      let res = await fetch("live.php");
      let data = await res.json();
      document.getElementById("data").innerHTML =
        `Speed: ${data.speed}<br>
         Temp: ${data.tempC}<br>
         Voltage: ${data.voltage}<br>
         Crash: ${data.crash}<br>
         Time: ${new Date(data.timestamp * 1000).toLocaleTimeString()}`;
    }
    update();
    setInterval(update, 1000);
  </script>
</body>
</html>
